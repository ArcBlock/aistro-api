title: aistro-ai
description: A Blocklet DAPP blocklet
keywords:
  - blocklet
  - react
group: dapp
did: z2qZzg5ESsAxNYKCEnf7nNzN4nN9N3MC5vzCR
main: api/dist/index.js
author:
  name: Arcblock
  email: zcoderrr@gmail.com
repository:
  type: git
  url: git+https://github.com/blocklet/create-blocklet.git
specVersion: 1.2.8
version: 0.1.0
logo: logo.png
files:
  - dist
  - logo.png
  - screenshots
  - api/dist/store/migrations/*.js
  - prompts
interfaces:
  - type: web
    name: publicUrl
    path: /
    prefix: "*"
    port: BLOCKLET_PORT
    protocol: http
community: ""
documentation: ""
homepage: ""
license: ""
payment:
  price: []
  share: []
timeout:
  start: 60
requirements:
  server: ">=1.16.28"
  os: "*"
  cpu: "*"
  aigne: true
scripts:
  dev: npm run start
  pre-start: node api/dist/hooks/pre-start.js
environments:
  - name: CHAIN_HOST
    description: Chain host URL
    required: false
    default: ""
  - name: DATABASE_PASSWORD
    description: Database password
    required: false
    secure: true
  - name: BILLING_ANDROID_SECRET
    description: Android billing secret key
    required: false
    secure: true
  - name: BILLING_IOS_SECRET
    description: iOS billing secret
    required: false
    secure: true
  - name: NOTIFICATION_SNS_SECRET_ACCESS_KEY
    description: AWS SNS secret access key
    required: false
    secure: true
  - name: AI_IMAGE_MODEL
    description: AI image generation model (e.g., openai/gpt-image-1)
    required: false
  - name: GOOGLE_CLIENT_ID
    description: Google OAuth client ID
    required: false
  - name: APPLE_CLIENT_ID
    description: Apple Sign-In client ID
    required: false
capabilities:
  clusterMode: true
  component: true
  navigation: true
screenshots: []
components: []
navigation:
  - id: invites
    title:
      en: Invites
      zh: 邀请码
    icon: gg:user-add
    link: /admin/invites
    section:
      - dashboard
    role:
      - admin
      - owner
  - id: fortune_analysis
    title:
      en: Fortune Analysis
      zh: 运势报告分析
    icon: carbon:text-link-analysis
    link: /admin/fortune_analysis
    section:
      - dashboard
    role:
      - admin
      - owner
  - id: settings
    title:
      en: Settings
      zh: 设置
    icon: ic:outline-settings
    link: /admin/settings
    section:
      - dashboard
    role:
      - admin
      - owner
